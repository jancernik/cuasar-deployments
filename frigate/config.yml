go2rtc:
  streams:
    camera1:
      - rtsp://{FRIGATE_CAMERA_1_USER}:{FRIGATE_CAMERA_1_PASSWORD}@{FRIGATE_CAMERA_1_ADDRESS}:554/h264Preview_01_main
    camera1_sub:
      - rtsp://{FRIGATE_CAMERA_1_USER}:{FRIGATE_CAMERA_1_PASSWORD}@{FRIGATE_CAMERA_1_ADDRESS}:554/h264Preview_01_sub
    camera2:
      - rtsp://{FRIGATE_CAMERA_2_USER}:{FRIGATE_CAMERA_2_PASSWORD}@{FRIGATE_CAMERA_2_ADDRESS}:554/h264Preview_01_main
    camera2_sub:
      - rtsp://{FRIGATE_CAMERA_2_USER}:{FRIGATE_CAMERA_2_PASSWORD}@{FRIGATE_CAMERA_2_ADDRESS}:554/h264Preview_01_sub

tls:
  enabled: false

ffmpeg:
  input_args: preset-rtsp-generic

cameras:
  camera1:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/camera1_sub
          roles:
            - detect
        - path: rtsp://127.0.0.1:8554/camera1
          roles:
            - record
    onvif:
      host: "{FRIGATE_CAMERA_1_ADDRESS}"
      port: 8000
      user: "{FRIGATE_CAMERA_1_USER}"
      password: "{FRIGATE_CAMERA_1_PASSWORD}"
    motion:
      enabled: true
      mask: 0.340,0.005,0.660,0.005,0.660,0.065,0.340,0.065
  camera2:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/camera2_sub
          roles:
            - detect
        - path: rtsp://127.0.0.1:8554/camera2
          roles:
            - record
    onvif:
      host: "{FRIGATE_CAMERA_2_ADDRESS}"
      port: 8000
      user: "{FRIGATE_CAMERA_2_USER}"
      password: "{FRIGATE_CAMERA_2_PASSWORD}"
    motion:
      enabled: true
      mask: 0.340,0.005,0.660,0.005,0.660,0.065,0.340,0.065
database:
  path: /frigate/frigate.db

detect:
  enabled: false
  width: 896
  height: 512
  fps: 5

detectors:
  coral:
    type: edgetpu
    device: usb

snapshots:
  enabled: true
  timestamp: true
  bounding_box: true
  retain:
    default: 30

objects:
  track:
    - person
    - cat
    - dog

mqtt:
  enabled: true
  port: 1883
  host: "{FRIGATE_MQTT_HOST}"
  user: "{FRIGATE_MQTT_USER}"
  password: "{FRIGATE_MQTT_PASSWORD}"

record:
  enabled: true
  alerts:
    pre_capture: 3
    post_capture: 3
    retain:
      days: 14
  detections:
    pre_capture: 3
    post_capture: 3
    retain:
      days: 14

  continuous:
    days: 0
  motion:
    days: 14
version: 0.17-0