        icon: /icons/truenas.png
        href: {{HOMEPAGE_VAR_TRUENAS_URL}}
        siteMonitor: {{HOMEPAGE_VAR_TRUENAS_ADDRESS}}
        description: Network-Attached Storage
        widget:
          type: truenas
          url: {{HOMEPAGE_VAR_TRUENAS_ADDRESS}}
